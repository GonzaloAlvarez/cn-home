# cn-home/dashy/conf.yml — kaiser.lan LAN homepage.
#
# ────────────────────────────────────────────────────────────────────────────
# LLM-AGENT EDIT TARGET
# Add a new service link by appending an `items:` entry under the appropriate
# `sections[].` group below. Keep alphabetical ordering within each group.
# Dashy probes each URL when `appConfig.statusCheck` is true.
# ────────────────────────────────────────────────────────────────────────────

pageInfo:
  title: home.kaiser.lan
  description: Homelab LAN dashboard
  navLinks: []

appConfig:
  theme: dark
  layout: auto
  iconSize: medium
  language: en
  statusCheck: true
  statusCheckInterval: 60
  faviconApi: faviconkit
  enableErrorReporting: false
  disableConfiguration: true
  hideComponents:
    hideSettings: false
    hideHeading: false
    hideNav: false
    hideFooter: false

sections:
  - name: Observability (kaiser.lan)
    icon: fas fa-chart-line
    items:
      - title: Grafana
        description: Dashboards for kaiser, in-LAN
        url: https://grafana.kaiser.lan
        icon: si-grafana
        target: newtab
      - title: Prometheus
        description: Metrics scraper
        url: https://prometheus.kaiser.lan
        icon: si-prometheus
        target: newtab
      - title: Alertmanager
        description: Alert routing
        url: https://alertmanager.kaiser.lan
        icon: fas fa-bell
        target: newtab
      - title: Loki
        description: Log aggregation
        url: https://loki.kaiser.lan
        icon: fas fa-stream
        target: newtab
      - title: Portainer
        description: Container management
        url: https://portainer.kaiser.lan
        icon: si-portainer
        target: newtab

  - name: Torrent (kaiser.lan)
    icon: fas fa-download
    items:
      - title: qBittorrent
        description: Torrent client — egress via infra-mullvad
        url: https://torrent.kaiser.lan
        icon: si-qbittorrent
        target: newtab
      - title: Lidarr
        description: Music indexer/organizer
        url: https://lidarr.kaiser.lan
        icon: si-lidarr
        target: newtab
      - title: Prowlarr
        description: Indexer aggregator
        url: https://prowlarr.kaiser.lan
        icon: si-prowlarr
        target: newtab
      - title: Radarr
        description: Movies indexer/organizer
        url: https://radarr.kaiser.lan
        icon: si-radarr
        target: newtab
      - title: Readarr
        description: Books/eBooks organizer
        url: https://readarr.kaiser.lan
        icon: si-readarr
        target: newtab
      - title: Sonarr
        description: TV shows indexer/organizer
        url: https://sonarr.kaiser.lan
        icon: si-sonarr
        target: newtab

  - name: Media (kaiser.lan)
    icon: fas fa-film
    items:
      - title: Jellyfin
        description: Media server — movies, TV, music
        url: https://jellyfin.kaiser.lan
        icon: si-jellyfin
        target: newtab
      - title: RomM
        description: Retro ROM library + in-browser play
        url: https://roms.kaiser.lan
        icon: si-nintendogamecube
        target: newtab

  - name: Apps
    icon: fas fa-th-large
    items:
      - title: Authentik (LAN)
        description: SSO / OIDC provider on neptune.lan
        url: https://auth.neptune.lan
        icon: si-authentik
        target: newtab
      - title: Home Assistant
        description: HA Supervised on homeiot.lan
        url: https://homeiot.lan
        icon: si-homeassistant
        target: newtab
      - title: pfSense
        url: https://router.lan
        icon: si-pfsense
        target: newtab
      - title: SparkyFitness
        description: Fitness, nutrition, exercise, hydration tracker
        url: https://fitness.kaiser.lan
        icon: fas fa-running
        target: newtab
      - title: step-ca / Uptime Kuma
        url: https://pki.lan
        icon: fas fa-certificate
        target: newtab
      - title: Vaultwarden (LAN)
        description: Passwords on the LAN
        url: https://passwords.lan
        icon: si-bitwarden
        target: newtab

  - name: Cluster (k8s.lan)
    icon: si-kubernetes
    items:
      - title: Headlamp (Cluster UI)
        url: http://cluster.k8s.lan
        icon: si-kubernetes
        target: newtab
      - title: Longhorn
        url: http://longhorn.k8s.lan
        icon: si-rancher
        target: newtab
      - title: FreshRSS (LAN)
        url: http://freshrss.k8s.lan
        icon: si-rss
        target: newtab
      - title: NetBox (LAN)
        url: http://netbox.k8s.lan
        icon: fas fa-network-wired
        target: newtab
      - title: Filemanager (LAN)
        url: http://filemanager.k8s.lan
        icon: fas fa-folder-open
        target: newtab
